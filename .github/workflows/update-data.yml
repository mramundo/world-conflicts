name: Update data (hourly)

on:
  schedule:
    # Top of every hour
    - cron: "0 * * * *"
  workflow_dispatch: {}   # Allow manual runs from the Actions UI

permissions:
  contents: write   # Commit the refreshed JSON files
  actions: write    # Re-trigger the Pages deploy workflow after committing

concurrency:
  group: update-data
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      committed: ${{ steps.commit.outputs.committed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: update-scripts/requirements.txt

      - name: Install deps
        run: pip install -r update-scripts/requirements.txt

      - name: Fetch news
        id: fetch_news
        run: python update-scripts/fetch_news.py

      - name: Fetch conflicts
        id: fetch_conflicts
        run: python update-scripts/fetch_conflicts.py

      - name: Commit updates
        id: commit
        run: |
          git config user.name  "world-conflicts-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/news.json data/conflicts.json || true
          if git diff --cached --quiet; then
            echo "No data changes."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore(data): refresh $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # Race-safe push: a human commit can land on main between checkout
          # and push. Retry with rebase so the bot's data-only commit replays
          # cleanly on top. Up to 5 attempts with backoff.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "committed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Push attempt $attempt rejected; rebasing onto origin/main and retrying."
            git pull --rebase --autostash origin main
            sleep $((attempt * 2))
          done
          echo "::error::git push failed after 5 attempts."
          exit 1

      # GitHub intentionally does NOT trigger workflows for pushes made with the
      # default GITHUB_TOKEN — that's why the site wasn't redeploying. The only
      # events exempt from that rule are workflow_dispatch and repository_dispatch,
      # so we re-trigger the Pages deploy explicitly here.
      - name: Trigger Pages deploy
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run pages.yml --ref main
