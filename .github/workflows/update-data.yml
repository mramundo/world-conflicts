name: Update data (hourly)

on:
  schedule:
    # Top of every hour
    - cron: "0 * * * *"
  workflow_dispatch: {}   # Allow manual runs from the Actions UI

permissions:
  contents: write   # Needed to commit the refreshed JSON files

concurrency:
  group: update-data
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: update-scripts/requirements.txt

      - name: Install deps
        run: pip install -r update-scripts/requirements.txt

      - name: Fetch news
        run: python update-scripts/fetch_news.py
        continue-on-error: true

      - name: Fetch conflicts
        run: python update-scripts/fetch_conflicts.py
        continue-on-error: true

      - name: Commit updates
        run: |
          git config user.name  "world-conflicts-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/news.json data/conflicts.json || true
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "chore(data): refresh $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
